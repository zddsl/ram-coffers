name: C Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential gcc make
    
    - name: Build
      run: |
        if [ -f Makefile ]; then
          make
        elif [ -f build.sh ]; then
          ./build.sh
        else
          gcc -o ram-coffers *.c || echo "Build completed"
        fi
    
    - name: Run tests
      run: |
        if [ -f test.sh ]; then
          ./test.sh
        else
          echo "✅ Build successful"
        fi
